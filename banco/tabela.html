<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Tabela — Oracle</title>
  <link rel="stylesheet" href="/banco/style.css">
  <style>
    .voltar { font-size: 12px; color: #555; text-decoration: none; display: inline-block; margin-bottom: 16px; }
    .voltar:hover { color: #ccc; }
    .col-lista { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .col-badge {
      font-size: 11px; padding: 3px 9px;
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; color: #777;
    }
    .col-badge span { color: #555; margin-left: 4px; }
    .nullable { color: #3a3a3a; }
  </style>
</head>
<body>

<a class="voltar" href="/banco/">← Voltar</a>
<h1 id="titulo">…</h1>
<div class="sub" id="sub"></div>

<div class="bloco" id="sec-colunas">
  <label>Colunas</label>
  <div id="colunas-status" class="nav-status">carregando...</div>
  <div id="colunas-lista"></div>
</div>

<div class="bloco" style="margin-top:20px">
  <label>Dados <span style="color:#3a3a3a;font-size:10px">— primeiras 100 linhas</span></label>
  <div id="dados-status" class="nav-status">carregando...</div>
  <div id="dados-tabela" style="overflow-x:auto"></div>
</div>

<script src="/banco/tabela.js"></script>
</body>
</html>
