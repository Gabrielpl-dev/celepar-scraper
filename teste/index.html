<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Teste</h1>
<div class="sub">Busca de bulas via API Agrofit (Embrapa)</div>

<div class="step">
  <div class="step-num">Produto</div>
  <label>Registro MA</label>
  <input id="ma" type="text" inputmode="numeric" placeholder="ex: 32823" oninput="this.value=this.value.replace(/\D/g,'')" />
  <div class="row" style="margin-top:10px">
    <button id="btn-buscar" onclick="buscarPorApi()">Buscar bulas</button>
  </div>

  <label style="margin-top:16px">Ou buscar por nome</label>
  <input id="busca-nome" type="text" placeholder="ex: GLIFORCE SL" />
  <div id="nome-resultados"></div>
</div>

<div id="saida"></div>

<div id="pdf-overlay">
  <div id="pdf-overlay-bar">
    <span id="pdf-overlay-titulo"></span>
    <button id="pdf-overlay-fechar" onclick="fecharPdf()">✕ Fechar</button>
  </div>
  <iframe id="pdf-overlay-frame"></iframe>
</div>

<script src="app.js"></script>
</body>
</html>
