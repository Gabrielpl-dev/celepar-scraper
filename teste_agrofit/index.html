<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Agrofit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Agrofit — Bulas</h1>
<div class="sub">Busca e cache de IDs por produto</div>

<!-- PASSO 1 -->
<div class="step">
  <div class="step-num">Produto</div>
  <label>Nome do produto (marca comercial)</label>
  <input id="nome" type="text" placeholder="ex: Invencis" oninput="checarIdSalvo()" />
  <div class="hint-id" id="hint-id"></div>
  <div class="row">
    <button id="btn-direto" onclick="buscarDireto()">Buscar bula ↵</button>
    <button id="btn-abrir"  onclick="abrirAgrofit()">Copiar e abrir Agrofit ↗</button>
    <span class="copiado" id="copiado">✓ copiado</span>
  </div>
</div>

<!-- PASSO 2 -->
<div class="step" id="passo2">
  <div class="step-num">Passo 2 — Cole a URL do produto encontrado no Agrofit</div>
  <label>URL do produto</label>
  <input id="url" type="text" placeholder="ex: https://agrofit.agricultura.gov.br/agrofit_cons/!ap_produto_form_detalhe_cons?...&p_id_produto_formulado_tecnico=23827" />
  <div class="row">
    <button id="btn-buscar" onclick="buscarPorUrl()">Buscar bula</button>
  </div>
</div>

<div id="saida"></div>

<div id="pdf-overlay">
  <div id="pdf-overlay-bar">
    <span id="pdf-overlay-titulo"></span>
    <button id="pdf-overlay-fechar" onclick="fecharPdf()">✕ Fechar</button>
  </div>
  <iframe id="pdf-overlay-frame"></iframe>
</div>

<!-- IDs Salvos -->
<div id="ids-salvos">
  <div class="ids-header" onclick="toggleIdsSalvos()">
    <span id="ids-titulo">▶ IDs salvos (0)</span>
  </div>
  <div id="ids-lista"></div>
</div>

<script src="app.js"></script>
</body>
</html>
