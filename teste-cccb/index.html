<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste CCCB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Teste CCCB</h1>
<div class="sub">Comparar Cultura Celepar com o Banco — sandbox de desenvolvimento</div>

<section class="bloco">
  <div class="bloco-titulo">Parâmetros do produto</div>
  <div class="params-body">
    <div class="params-form">

      <div class="field">
        <label for="p-nome">Produto</label>
        <div class="search-wrap">
          <input id="p-nome" type="text" placeholder="ex: BELURE" autocomplete="off">
          <span id="search-hint" class="hint" style="display:none">buscando...</span>
          <ul id="dropdown" class="dropdown" style="display:none"></ul>
        </div>
      </div>

      <div class="field">
        <label for="p-cod">Cod</label>
        <input id="p-cod" type="text" placeholder="ex: 2968">
      </div>

      <div class="field">
        <label for="p-ma">Registro MA</label>
        <input id="p-ma" type="text" inputmode="numeric" placeholder="ex: 00513">
      </div>

    </div>

    <div class="sources-panel">
      <div class="sources-titulo">Fontes</div>
      <div class="source-row"><span class="dot" id="dot-banco"></span> Banco</div>
      <div class="source-row"><span class="dot" id="dot-adapar"></span> Adapar</div>
      <div class="source-row"><span class="dot" id="dot-agrofit"></span> Agrofit <span id="ma-info" class="ma-info"></span></div>
      <div class="source-row"><span class="dot" id="dot-sigen"></span> Sigen</div>
    </div>
  </div>
</section>

<section class="bloco">
  <div class="bloco-titulo">CCCB</div>
  <div class="cccb-row">
    <label>Cultura
      <input id="cultura-input" type="text" list="culturas-list" placeholder="todas as culturas">
      <datalist id="culturas-list"></datalist>
    </label>
    <button id="btn-run">Executar ↵</button>
    <button id="btn-sincronizar" class="ghost">↻ sincronizar culturas</button>
    <button id="btn-mapping" class="ghost">⚙ gerar mapeamento</button>
  </div>
  <div id="status" class="status"></div>
</section>

<div id="resultado"></div>

<script type="module" src="app.js"></script>
</body>
</html>
